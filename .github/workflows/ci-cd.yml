name: CI/CD

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: reasel/whiskey-tasting

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install backend dependencies
      run: |
        cd apps/backend
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run backend tests with coverage
      run: |
        cd apps/backend
        python -m pytest --cov=app --cov-report=xml --cov-report=term

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd apps/frontend
        npm ci

    - name: Run frontend unit tests
      run: |
        cd apps/frontend
        npm run test:coverage

    - name: Run linter
      run: |
        cd apps/frontend
        npm run lint

    - name: Build frontend
      run: |
        cd apps/frontend
        npm run build

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install frontend dependencies
      run: |
        cd apps/frontend
        npm ci

    - name: Install Playwright browsers
      run: |
        cd apps/frontend
        npx playwright install --with-deps chromium webkit

    - name: Start test services
      run: |
        docker compose -f docker-compose.test.yml up -d

    - name: Wait for services to be healthy
      run: |
        timeout 120 bash -c 'until curl -f http://localhost:8011/api/v1/health; do sleep 2; done'

    - name: Run E2E tests
      run: |
        cd apps/frontend
        BASE_URL=http://localhost:3011 npx playwright test --project=chromium

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: apps/frontend/playwright-report/
        retention-days: 30

    - name: Stop test services
      if: always()
      run: |
        docker compose -f docker-compose.test.yml down -v

  test:
    needs: [test-backend, test-frontend, test-e2e]
    runs-on: ubuntu-latest
    steps:
    - run: echo "All tests passed"

  notify-staging-deploy:
    needs: [test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Notify staging deploy pending
      env:
        NTFY_URL: ${{ secrets.NTFY_URL }}
        NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        NTFY_AUTH_USER: ${{ secrets.NTFY_AUTH_USER }}
        NTFY_AUTH_PASS: ${{ secrets.NTFY_AUTH_PASS }}
      run: |
        if [ -z "$NTFY_URL" ] || [ -z "$NTFY_TOPIC" ]; then
          echo "NTFY not configured, skipping notification"
          exit 0
        fi
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        AUTH_ARGS=()
        if [ -n "$NTFY_TOKEN" ]; then
          AUTH_ARGS+=(-H "Authorization: Bearer $NTFY_TOKEN")
        elif [ -n "$NTFY_AUTH_USER" ] && [ -n "$NTFY_AUTH_PASS" ]; then
          AUTH_ARGS+=(-u "$NTFY_AUTH_USER:$NTFY_AUTH_PASS")
        fi
        curl -sf \
          "${AUTH_ARGS[@]}" \
          -H "Title: Staging deploy needs approval" \
          -H "Priority: high" \
          -H "Tags: rocket" \
          -H "Click: $RUN_URL" \
          -d "Commit ${{ github.sha }} by ${{ github.actor }} is waiting for staging approval — tap to review." \
          "$NTFY_URL/$NTFY_TOPIC" || true

  build-and-deploy-staging:
    needs: [test, notify-staging-deploy]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=staging

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  notify-production-deploy:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Notify production deploy pending
      env:
        NTFY_URL: ${{ secrets.NTFY_URL }}
        NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        NTFY_AUTH_USER: ${{ secrets.NTFY_AUTH_USER }}
        NTFY_AUTH_PASS: ${{ secrets.NTFY_AUTH_PASS }}
      run: |
        if [ -z "$NTFY_URL" ] || [ -z "$NTFY_TOPIC" ]; then
          echo "NTFY not configured, skipping notification"
          exit 0
        fi
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        AUTH_ARGS=()
        if [ -n "$NTFY_TOKEN" ]; then
          AUTH_ARGS+=(-H "Authorization: Bearer $NTFY_TOKEN")
        elif [ -n "$NTFY_AUTH_USER" ] && [ -n "$NTFY_AUTH_PASS" ]; then
          AUTH_ARGS+=(-u "$NTFY_AUTH_USER:$NTFY_AUTH_PASS")
        fi
        curl -sf \
          "${AUTH_ARGS[@]}" \
          -H "Title: Production deploy needs approval" \
          -H "Priority: urgent" \
          -H "Tags: rocket,warning" \
          -H "Click: $RUN_URL" \
          -d "Tag ${{ github.ref_name }} by ${{ github.actor }} is waiting for production approval — tap to review." \
          "$NTFY_URL/$NTFY_TOPIC" || true

  build-and-deploy-production:
    needs: [test, notify-production-deploy]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=tag
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          Automated release for version ${{ github.ref_name }}

          This release has been deployed to production.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}